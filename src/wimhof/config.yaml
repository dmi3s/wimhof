# Breathing techniques of the Wim Hof Method
# For more information, please visit:
#     https://www.wimhofmethod.com/breathing-techniques

background_image: assets/background.jpg
background_music: assets/music.mp3

rounds:

  # ==========================================================
  # PREPARATION
  # ==========================================================

  - section: Preparation

    repeat: 1
    sequence:
      - type: prepare
        behavior: prepare
        duration: 3
        label: "PREPARE"

  # ==========================================================
  # BREATHING
  # ==========================================================

  - section: Breathing

    repeat: 2

    sequence:
      - type: inhale
        behavior: expand
        duration: 2
        label: "INHALE"

      - type: exhale
        behavior: shrink
        duration: 2
        label: "EXHALE"

  - section: Breathing
    inherit: true
    repeat: 28

    sequence:
      - type: inhale
        display: "cycles"

      - type: exhale
        display: "cycles"

  # ==========================================================
  # HOLD
  # ==========================================================

  - section: Hold
    repeat: 1

    sequence:
      - type: hold
        behavior: pulse_small
        duration: 45
        label: "HOLD"

      - type: deep_inhale
        behavior: expand_big
        duration: 3
        label: "DEEP INHALE"

      - type: final_hold
        behavior: pulse_large
        duration: 15
        label: "HOLD"

  # ==========================================================
  # RECOVERY
  # ==========================================================

  - section: Recovery
    repeat: 1

    sequence:
      - type: relax
        behavior: fade_out
        duration: 5
        label: "RELAX"