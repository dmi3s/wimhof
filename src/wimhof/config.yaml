background_image: assets/background.jpg
background_music: assets/music.mp3

rounds:
  - name: "Round 1"
    repetitions: 30 # number of inhale/exhale cycles

    prepare:
      duration: 3.0
      label: "GET READY"

    inhale:
      duration: 2.2
      label: "INHALE"

    exhale:
      duration: 2.2
      label: "EXHALE"

    hold:
      duration: 45.0
      label: "HOLD"

    deep_inhale:
      duration: 3.0
      label: "DEEP INHALE"

    final_hold:
      duration: 15.0
      label: "HOLD"

    relax_countdown:
      duration: 3.0
      label: "RELAX"

  - name: "Round 2"
    inherit: true # inherit settings from Round 1
    repetitions: 30

    hold:
      duration: 60.0
      label: "HOLD"

  - name: "Round 3"
    inherit: true # inherit settings from Round 1

    hold:
      duration: 60.0
      label: "HOLD"
