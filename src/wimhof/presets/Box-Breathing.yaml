# Often used by athletes and military personnel for concentration

background_image: assets/background.jpg
background_music: assets/music.mp3

rounds:
  # ==========================================================
  # PREPARATION
  # ==========================================================

  - section: Preparation

    repeat: 1
    sequence:
      - type: prepare
        behavior: prepare
        duration: 3
        label: "PREPARE"

  # ==========================================================
  # BREATHING
  # ==========================================================

  - section: breathing

    repeat: 2

    sequence:
      - type: inhale
        behavior: expand
        duration: 4
        label: "INHALE"

      - type: hold
        behavior: pulse_small
        duration: 4
        label: "HOLD"

      - type: exhale
        behavior: shrink
        duration: 4
        label: "EXHALE"

      - type: hold
        behavior: pulse_small
        duration: 4
        label: "HOLD"

  - section: breathing

    repeat: 6

    sequence:
      - type: inhale
        behavior: expand
        duration: 4
        label: "INHALE"
        display: "cycles"

      - type: hold
        behavior: pulse_small
        duration: 4
        label: "HOLD"
        display: "cycles"

      - type: exhale
        behavior: shrink
        duration: 4
        label: "EXHALE"
        display: "cycles"

      - type: hold
        behavior: pulse_small
        duration: 4
        label: "HOLD"
        display: "cycles"


  # ==========================================================
  # RECOVERY
  # ==========================================================

  - section: Recovery
    repeat: 1

    sequence:
      - type: relax
        behavior: fade_out
        duration: 3
        label: "RELAX"
