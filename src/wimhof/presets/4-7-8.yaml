background_image: assets/background.jpg
background_music: assets/music.mp3

rounds:
  # ==========================================================
  # PREPARATION
  # ==========================================================

  - section: Preparation

    repeat: 1
    sequence:
      - type: prepare
        behavior: prepare
        duration: 3
        label: "PREPARE"

  # ==========================================================
  # BREATHING
  # ==========================================================

  - section: breathing

    repeat: 1
#    repeat: 8

    sequence:
      - type: inhale
        behavior: expand
        duration: 4
        label: "INHALE"

      - type: hold
        behavior: pulse_small
        duration: 7
        label: "HOLD"

      - type: exhale
        behavior: shrink
        duration: 8
        label: "EXHALE"

  # ==========================================================
  # RECOVERY
  # ==========================================================

  - section: Recovery
    repeat: 1

    sequence:
      - type: relax
        behavior: fade_out
        duration: 5
        label: "RELAX"