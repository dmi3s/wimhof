# Soothes the nervous system and promotes sleep.

background_image: assets/background.jpg
background_music: assets/music.mp3

rounds:
  # ==========================================================
  # PREPARATION
  # ==========================================================

  - section: Preparation
    repeat: 1

    sequence:
      - type: prepare
        behavior: prepare
        duration: 3
        label: "PREPARE"

  # ==========================================================
  # BREATHING
  # ==========================================================

  - section: breathing
    repeat: 2

    sequence:
      - type: inhale
        behavior: expand
        duration: 4
        label: "INHALE"

      - type: hold
        behavior: pulse_small
        duration: 7
        label: "HOLD"

      - type: exhale
        behavior: shrink
        duration: 8
        label: "EXHALE"

  - section: breathing
    repeat: 6
    inherit: true

    sequence:
      - type: inhale
        display: "cycles"

      - type: hold
        display: "cycles"

      - type: exhale
        display: "cycles"

  # ==========================================================
  # RECOVERY
  # ==========================================================

  - section: Recovery
    repeat: 1

    sequence:
      - type: relax
        behavior: fade_out
        duration: 5
        label: "RELAX"
