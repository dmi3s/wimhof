name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-groups --python 3.12

      - name: Ruff format # Format
        run: uv run ruff format --check src/wimhof

      - name: Ruff # Lint
        run: uv run ruff check src/wimhof

      - name: Mypy # Type checking
        run: uv run mypy src/wimhof

      - name: Audit
        run: uv audit --preview-features audit

      # Build
      - name: Build package
        run: uv build
