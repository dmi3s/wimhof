name: CI

on:
  push:
    # branches: [main]
    # tags: ["v*"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-groups --frozen --python 3.12

      - name: Ruff format
        run: uv run ruff format --check src/wimhof

      - name: Ruff lint
        run: uv run ruff check src/wimhof

      - name: Mypy type checking
        run: uv run mypy src/wimhof

      - name: Audit
        run: uv audit --preview-features audit

      - name: Build package
        run: uv build
